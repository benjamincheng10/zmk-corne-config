# Bluetooth device name shown when pairing
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Max Bluetooth transmit power (+8 dBm) for better split-half reliability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Eager debounce: register press after 1ms, release after 10ms.
# Reduces perceived key latency.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable deep sleep to save battery when idle
CONFIG_ZMK_SLEEP=y

# Deep sleep after 15 min (900000ms) of no keypresses.
# Keyboard disconnects BLE and takes ~1s to wake on keypress.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Show the right half's battery level on the left (central) display
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Enable nice!view display
CONFIG_ZMK_DISPLAY=y

# Use Bongo Cat instead of gauge/needle for WPM indicator
CONFIG_NICE_VIEW_GEM_WPM_BONGO_CAT=y

# Enable ZMK Studio for runtime keymap editing via USB
CONFIG_ZMK_STUDIO=y
# Disable Studio locking (no need for &studio_unlock key)
CONFIG_ZMK_STUDIO_LOCKING=n
